name: Manual Deploy to Railway

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy-backend:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Install Python dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v --tb=short
        continue-on-error: true

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
        run: |
          if [ "${{ github.event.inputs.environment }}" = "production" ]; then
            railway up --service backend --environment production
          else
            railway up --service backend --environment staging
          fi

      - name: Run smoke tests
        working-directory: backend
        run: |
          sleep 10
          curl -s https://$RAILWAY_BACKEND_URL/health || echo "Service not yet responding"
        env:
          RAILWAY_BACKEND_URL: ${{ secrets.RAILWAY_BACKEND_URL }}
        continue-on-error: true

      - name: Notify deployment
        run: |
          echo "✅ Backend deployed to ${{ github.event.inputs.environment }}"
          echo "🔗 Check: https://railway.app/dashboard"

  deploy-database:
    name: Setup Railway Database
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'production'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Run database migrations
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        working-directory: backend
        run: |
          python -m pip install alembic
          alembic upgrade head
