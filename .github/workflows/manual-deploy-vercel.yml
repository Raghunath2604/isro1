name: Manual Deploy to Vercel

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Install dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}

      - name: Deploy to Vercel (Preview)
        if: github.event.inputs.environment == 'preview'
        working-directory: frontend
        run: |
          vercel deploy --token=${{ secrets.VERCEL_TOKEN }} \
            --name=as3-platform-preview \
            --build-env VITE_API_URL=${{ secrets.VITE_API_URL }} \
            --build-env VITE_WS_URL=${{ secrets.VITE_WS_URL }}

      - name: Deploy to Vercel (Production)
        if: github.event.inputs.environment == 'production'
        working-directory: frontend
        run: |
          vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} \
            --name=as3-platform \
            --build-env VITE_API_URL=${{ secrets.VITE_API_URL }} \
            --build-env VITE_WS_URL=${{ secrets.VITE_WS_URL }}

      - name: Notify deployment
        run: |
          echo "✅ Frontend deployed to ${{ github.event.inputs.environment }}"
          echo "🔗 Check: https://vercel.com/dashboard"
