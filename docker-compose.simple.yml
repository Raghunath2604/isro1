version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: as3user
      POSTGRES_PASSWORD: as3password
      POSTGRES_DB: as3_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U as3user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
