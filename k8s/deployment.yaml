apiVersion: v1
kind: Namespace
metadata:
  name: as3

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: as3-config
  namespace: as3
data:
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  DEBUG: "False"
  LOG_LEVEL: "INFO"
  VITE_API_URL: "https://api.as3-platform.example.com"
  VITE_WS_URL: "wss://api.as3-platform.example.com"

---
apiVersion: v1
kind: Secret
metadata:
  name: as3-secrets
  namespace: as3
type: Opaque
stringData:
  SECRET_KEY: "your-super-secret-key-change-in-production"
  OPENAI_API_KEY: "sk-your-key-here"
  NASA_API_KEY: "your-nasa-key-here"
  DATABASE_PASSWORD: "as3password"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: as3
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: as3
  labels:
    app: as3-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: as3-db
  template:
    metadata:
      labels:
        app: as3-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "as3user"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: as3-secrets
                  key: DATABASE_PASSWORD
            - name: POSTGRES_DB
              value: "as3_db"
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: as3
  labels:
    app: as3-db
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: as3-db

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: as3-backend
  namespace: as3
  labels:
    app: as3-backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: as3-backend
  template:
    metadata:
      labels:
        app: as3-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/yourusername/as3-platform-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: as3-config
          env:
            - name: DATABASE_URL
              value: "postgresql://as3user:$(DATABASE_PASSWORD)@postgres:5432/as3_db"
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: as3-secrets
                  key: DATABASE_PASSWORD
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: as3-secrets
                  key: OPENAI_API_KEY
            - name: NASA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: as3-secrets
                  key: NASA_API_KEY
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: as3-secrets
                  key: SECRET_KEY
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: as3-backend
  namespace: as3
  labels:
    app: as3-backend
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  selector:
    app: as3-backend

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: as3-frontend
  namespace: as3
  labels:
    app: as3-frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: as3-frontend
  template:
    metadata:
      labels:
        app: as3-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/yourusername/as3-platform-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: as3-config
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "200m"

---
apiVersion: v1
kind: Service
metadata:
  name: as3-frontend
  namespace: as3
  labels:
    app: as3-frontend
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app: as3-frontend

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: as3-ingress
  namespace: as3
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-protocols: "TLSv1.2 TLSv1.3"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - as3-platform.example.com
        - api.as3-platform.example.com
      secretName: as3-tls-cert
  rules:
    - host: as3-platform.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: as3-frontend
                port:
                  number: 3000
    - host: api.as3-platform.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: as3-backend
                port:
                  number: 8000

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: as3-backend-hpa
  namespace: as3
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: as3-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: as3-frontend-hpa
  namespace: as3
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: as3-frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
